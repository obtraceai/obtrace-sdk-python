name: Security

on:
  pull_request:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: obtrace-runners
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  audit:
    runs-on: obtrace-runners
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip pip-audit
      - run: pip-audit
